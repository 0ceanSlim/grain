<!-- Event Page Component -->
<div class="container max-w-4xl px-4 py-8 mx-auto">
  <!-- Loading State -->
  <div id="loading" class="text-center">
    <div
      class="inline-block w-8 h-8 border-2 border-white rounded-full animate-spin border-t-transparent"
    ></div>
    <p class="mt-2 text-text-secondary">Loading event...</p>
  </div>

  <!-- Error State -->
  <div id="error" class="hidden text-center">
    <div
      class="max-w-md p-6 mx-auto bg-danger-dim border border-danger rounded-lg"
    >
      <h2 class="mb-2 text-xl font-bold text-danger">❌ Event Error</h2>
      <p id="error-message" class="mb-4 text-danger">Failed to load event</p>
      <button
        onclick="retryLoadEvent()"
        class="px-4 py-2 text-text transition-colors bg-danger rounded hover:opacity-80"
      >
        Retry
      </button>
    </div>
  </div>

  <!-- Event Content -->
  <div id="event-content" class="hidden">
    <!-- Event Header -->
    <div class="mb-6 text-center">
      <h1 class="mb-2 text-3xl font-bold text-text">Event</h1>
      <!-- Event ID with copy button -->
      <div class="flex items-center justify-center gap-2 mb-4">
        <span id="event-id" class="font-mono text-sm text-text-secondary"
          >Loading...</span
        >
        <button
          onclick="copyEventId()"
          class="text-text-secondary transition-colors hover:text-text"
          title="Copy Event ID"
        >
          📋
        </button>
      </div>
    </div>

    <!-- Event Kind Display -->
    <div id="event-kind-display" class="mb-6">
      <div class="p-6 bg-surface rounded-lg">
        <h3 class="mb-4 text-xl font-semibold text-text">
          Event Kind <span id="event-kind" class="text-accent">0</span>
        </h3>

        <!-- Kind-specific content will be rendered here -->
        <div id="kind-specific-content">
          <!-- Default: Raw JSON display -->
          <div class="p-4 bg-surface-inset-strong rounded-lg">
            <h4 class="mb-2 text-sm font-medium text-text-secondary">
              Raw Event JSON
            </h4>
            <pre
              id="raw-event-json"
              class="text-sm text-text-secondary break-all whitespace-pre-wrap"
            >
Loading...</pre
            >
          </div>
        </div>
      </div>
    </div>

    <!-- Event Metadata -->
    <div class="grid grid-cols-1 gap-4 mb-6 md:grid-cols-2">
      <!-- Author -->
      <div class="p-4 bg-surface rounded-lg">
        <h4 class="mb-2 text-sm font-medium text-text-secondary">Author</h4>
        <div class="flex items-center gap-2">
          <span
            id="event-author"
            class="font-mono text-sm text-accent break-all"
            >Loading...</span
          >
          <button
            onclick="copyAuthor()"
            class="text-text-secondary transition-colors hover:text-text"
            title="Copy Author"
          >
            📋
          </button>
        </div>
      </div>

      <!-- Created At -->
      <div class="p-4 bg-surface rounded-lg">
        <h4 class="mb-2 text-sm font-medium text-text-secondary">Created</h4>
        <span id="event-created" class="text-text-secondary">Loading...</span>
      </div>
    </div>

    <!-- Event Tags (if any) -->
    <div id="event-tags-container" class="hidden mb-6">
      <div class="p-4 bg-surface rounded-lg">
        <h4 class="mb-2 text-sm font-medium text-text-secondary">Tags</h4>
        <div id="event-tags" class="space-y-2">
          <!-- Tags will be populated here -->
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-center gap-4">
      <button
        onclick="toggleEventJson()"
        id="toggle-json-btn"
        class="px-6 py-3 text-text transition-colors bg-surface-elevated rounded-lg hover:bg-surface-hover"
      >
        Show Event JSON
      </button>

      <button
        onclick="viewAuthorProfile()"
        class="px-6 py-3 text-text transition-colors bg-accent rounded-lg hover:bg-accent-hover"
      >
        View Author Profile
      </button>
    </div>

    <!-- JSON Toggle Container (hidden by default) -->
    <div id="json-container" class="hidden mt-6">
      <div class="p-4 bg-surface-inset-strong rounded-lg">
        <h4 class="mb-2 text-sm font-medium text-text-secondary">
          Complete Event JSON
        </h4>
        <pre
          id="complete-event-json"
          class="overflow-x-auto text-sm text-text-secondary break-all whitespace-pre-wrap"
        >
Loading...</pre
        >
      </div>
    </div>

    <!-- Debug Info (hidden elements for JavaScript) -->
    <div class="hidden">
      <span id="event-author-hex"></span>
    </div>
  </div>
</div>
<script src="/static/js/event-page.js"></script>
