{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Grain" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Grain" />
    <meta
      name="description"
      content="Go Relay Architecture for Implementing Nostr"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#8b5cf6" />

    <!-- Apple Touch Icons -->
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/static/icons/icon-152x152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/static/icons/icon-180x180.png"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/static/icons/icon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/static/icons/icon-16x16.png"
    />

    <!-- Apply the saved theme BEFORE the body renders so the page
         doesn't flash the wrong palette during paint. theme.js
         exposes window.GrainTheme for the header swapper. -->
    <script src="/static/js/theme.js"></script>

    <!-- Load external libraries first. These will be replaced on build with local minified
     versions and the build step will replace the tailwind cdn and compile the full minified css -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      src="https://unpkg.com/htmx.org@2.0.4"
      integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.14"></script>

    <!-- nostr-mill: registers the <nostr-signer> custom element and
         exposes window.MILL. Bundled into the binary at build time;
         no runtime CDN dependency. The bridge that wires mill into
         grain's session API loads right after. -->
    <script src="/static/mill/mill.umd.min.js"></script>
    <script src="/static/js/mill-bridge.js" defer></script>

    <title>{{.Title}}</title>
    <style>
      /* Tokens used throughout. Inline rather than a separate
         stylesheet because this <style> block is small and only
         drives the loading spinner + PWA banner — keeping it here
         avoids one extra round-trip on first paint. */
      .spinner {
        display: none;
        width: 32px;
        height: 32px;
        border: 5px solid var(--color-accent-dim);
        border-top: 5px solid var(--color-accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* PWA Install Banner. Picks up theme tokens so the banner
         retints with the rest of the app. Buttons keep
         translucent-white treatment because they always render on
         top of the accent gradient — they only need to read as
         "on accent" regardless of theme. */
      .pwa-install-banner {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(
          135deg,
          var(--color-accent),
          var(--color-accent-hover)
        );
        color: var(--color-accent-fg);
        padding: 1rem;
        /* Honor iOS notch / home indicator inset. */
        padding-bottom: max(1rem, env(safe-area-inset-bottom));
        transform: translateY(100%);
        transition: transform var(--motion-slow) ease-in-out;
        z-index: 1000;
        box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.25);
      }

      .pwa-install-banner.show {
        transform: translateY(0);
      }

      .pwa-install-banner button {
        background: rgb(255 255 255 / 0.2);
        border: 1px solid rgb(255 255 255 / 0.3);
        color: var(--color-accent-fg);
        padding: 0.5rem 1rem;
        border-radius: var(--radius-sm);
        font-weight: 500;
        transition: background var(--motion) ease;
      }

      .pwa-install-banner button:hover {
        background: rgb(255 255 255 / 0.3);
      }
    </style>
  </head>
  {{template "header" .}}
  <body class="text-center">
    {{template "view" .}}

    <!-- PWA Install Banner -->
    <div id="pwa-install-banner" class="pwa-install-banner">
      <div class="flex items-center justify-between max-w-md mx-auto">
        <div class="flex-1">
          <h4 class="font-semibold">Install Grain</h4>
          <p class="text-sm opacity-90">
            Add to your home screen for quick access
          </p>
        </div>
        <div class="flex ml-4 space-x-2">
          <button id="pwa-install-btn" class="install-btn">Install</button>
          <button id="pwa-dismiss-btn" class="dismiss-btn">×</button>
        </div>
      </div>
    </div>

    <!-- Load JavaScript in proper order -->
    <script>
      // Wait for HTMX to be ready
      function waitForHTMX() {
        if (typeof htmx !== "undefined" && htmx.version) {
          console.log("HTMX ready, version:", htmx.version);

          // Load scripts in proper order - navigation FIRST
          const navigationScript = document.createElement("script");
          navigationScript.src = "/static/js/navigation.js";
          navigationScript.onload = () => {
            console.log("✅ Navigation.js loaded");

            // Load routing after navigation
            const routingScript = document.createElement("script");
            routingScript.src = "/static/js/routing.js";
            routingScript.onload = () => {
              console.log("✅ Routing.js loaded");

              // Load other scripts. dropdown.js is intentionally
              // omitted: navigation.js now owns
              // toggleUserDropdown / closeUserDropdown and includes
              // viewport-aware positioning under the login button.
              // Loading dropdown.js late would clobber those
              // globals with the old "just toggle hidden" logic
              // that left the panel at fixed:(0,0).
              const otherScripts = [
                "/static/js/search.js",
              ];
              otherScripts.forEach((src) => {
                const script = document.createElement("script");
                script.src = src;
                script.onload = () => console.log("✅ Loaded:", src);
                document.head.appendChild(script);
              });
            };
            document.head.appendChild(routingScript);
          };
          document.head.appendChild(navigationScript);
        } else {
          setTimeout(waitForHTMX, 50);
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", waitForHTMX);
      } else {
        waitForHTMX();
      }
    </script>

    <!-- PWA Service Worker and Install Logic -->
    <script>
      // Service Worker Registration
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              console.log("[SW] Registered successfully:", registration.scope);

              // Check for updates
              registration.addEventListener("updatefound", () => {
                const newWorker = registration.installing;
                newWorker.addEventListener("statechange", () => {
                  if (
                    newWorker.state === "installed" &&
                    navigator.serviceWorker.controller
                  ) {
                    showUpdateAvailable(registration);
                  }
                });
              });
            })
            .catch((error) => {
              console.error("[SW] Registration failed:", error);
            });
        });
      }

      // PWA Install Prompt
      let deferredPrompt;
      const installBanner = document.getElementById("pwa-install-banner");
      const installBtn = document.getElementById("pwa-install-btn");
      const dismissBtn = document.getElementById("pwa-dismiss-btn");

      // Listen for install prompt
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;

        if (!localStorage.getItem("pwa-install-dismissed")) {
          showInstallBanner();
        }
      });

      // Show/hide banner functions
      function showInstallBanner() {
        if (installBanner) installBanner.classList.add("show");
      }

      function hideInstallBanner() {
        if (installBanner) installBanner.classList.remove("show");
      }

      // Install button click
      if (installBtn) {
        installBtn.addEventListener("click", async () => {
          if (!deferredPrompt) return;

          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log(`[PWA] User response: ${outcome}`);

          deferredPrompt = null;
          hideInstallBanner();
        });
      }

      // Dismiss button click
      if (dismissBtn) {
        dismissBtn.addEventListener("click", () => {
          hideInstallBanner();
          localStorage.setItem("pwa-install-dismissed", "true");
        });
      }

      // App installed
      window.addEventListener("appinstalled", () => {
        console.log("[PWA] App installed successfully");
        hideInstallBanner();
        deferredPrompt = null;
      });

      // Update available notification
      function showUpdateAvailable(registration) {
        const updateNotification = document.createElement("div");
        // Inline tokens via getComputedStyle so the JS-generated
        // popup reads from whatever theme is active when it fires.
        const cs = getComputedStyle(document.documentElement);
        const info = cs.getPropertyValue("--color-info").trim();
        const onAccent = cs.getPropertyValue("--color-text-on-accent").trim();
        updateNotification.innerHTML = `
          <div style="position: fixed; top: 1rem; right: 1rem; background: ${info}; color: ${onAccent}; padding: 1rem; border-radius: 0.5rem; z-index: 1001; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.25);">
            <div class="flex items-center space-x-3">
              <span>🚀 New version available!</span>
              <button onclick="refreshApp()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: inherit; padding: 0.25rem 0.75rem; border-radius: 0.25rem; font-size: 0.875rem;">
                Update
              </button>
              <button onclick="this.parentElement.parentElement.remove()" style="background: none; border: none; color: inherit; padding: 0.25rem; font-size: 1.25rem;">
                ×
              </button>
            </div>
          </div>
        `;
        document.body.appendChild(updateNotification);
      }

      // Refresh for updates
      function refreshApp() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistration().then((registration) => {
            if (registration && registration.waiting) {
              registration.waiting.postMessage({ type: "SKIP_WAITING" });
              window.location.reload();
            }
          });
        }
      }

      // Offline status handling
      function updateOnlineStatus() {
        if (!navigator.onLine) {
          showOfflineNotification();
        }
      }

      function showOfflineNotification() {
        const offlineNotification = document.createElement("div");
        offlineNotification.id = "offline-notification";
        const cs = getComputedStyle(document.documentElement);
        const warning = cs.getPropertyValue("--color-warning").trim();
        const onAccent = cs.getPropertyValue("--color-text-on-accent").trim();
        offlineNotification.innerHTML = `
          <div style="position: fixed; top: 0; left: 0; right: 0; background: ${warning}; color: ${onAccent}; padding: 0.5rem; text-align: center; z-index: 1002; font-size: 0.875rem;">
            📡 You're offline. Some features may be limited.
          </div>
        `;
        document.body.appendChild(offlineNotification);
      }

      function hideOfflineNotification() {
        const notification = document.getElementById("offline-notification");
        if (notification) notification.remove();
      }

      window.addEventListener("online", () => {
        hideOfflineNotification();
      });

      window.addEventListener("offline", updateOnlineStatus);

      // Make functions globally available
      window.refreshApp = refreshApp;
    </script>
  </body>
  {{template "footer" .}}
</html>
{{end}}
