services:
  grain:
    build: . # Uses the Dockerfile in current directory
    container_name: grain-relay
    ports:
      - "8181:8181"
    environment:
      - GRAIN_ENV=production
    volumes:
      # Grain writes config + LMDB store + logs under $HOME/.grain (i.e.
      # /home/grain/.grain inside the container). A volume on /app/data
      # would be silently empty and `compose down && up` would erase the
      # database — see #70.
      - grain_data:/home/grain/.grain
    restart: unless-stopped

volumes:
  grain_data:
