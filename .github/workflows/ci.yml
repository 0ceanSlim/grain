name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install nostrdb build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool

      - name: Show Docker + Compose versions
        run: |
          docker --version
          docker compose version

      # Bring up docker test environment FIRST, while the nostrdb tree is
      # still clean. The host-side build below dirties secp256k1's autotools
      # output with absolute host paths, which would break the docker COPY.
      - name: Start test environment (docker compose)
        working-directory: tests
        run: make test-start

      - name: Run integration tests
        working-directory: tests
        run: make test-run

      # Host-side nostrdb build. Needed for the review tests, which shell
      # out to `go build ./...` on the host to catch dead code and link
      # errors. Safe to run now — docker images are already built.
      - name: Build nostrdb C library for host-side go build
        run: |
          cd server/db/nostrdb
          bash build.sh

      - name: Run review tests
        working-directory: tests
        run: make test-review

      - name: Stop test environment + collect logs
        if: always()
        working-directory: tests
        run: make test-stop

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: tests/logs/
          if-no-files-found: ignore
          retention-days: 7
