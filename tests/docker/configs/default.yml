logging:
  level: "debug"
  file: "debug"
  max_log_size_mb: 10
  structure: false
  check_interval_min: 10
  backup_count: 2

client:
  default_relays:
    - "wss://relay.damus.io"

database:
  path: "data"
  map_size_mb: 512

server:
  port: :8182
  read_timeout: 60
  write_timeout: 20
  idle_timeout: 1200
  max_subscriptions_per_client: 10
  implicit_req_limit: 500

resource_limits:
  cpu_cores: 2
  memory_mb: 1024
  heap_size_mb: 512

auth:
  enabled: false
  relay_url: "ws://localhost:8182"

backup_relay:
  enabled: false
  url: ""

event_purge:
  enabled: false
  disable_at_startup: true
  keep_interval_hours: 24
  purge_interval_minutes: 240
  purge_by_category:
    regular: false
    replaceable: false
    addressable: false
    deprecated: false
  purge_by_kind_enabled: false
  kinds_to_purge: []
  exclude_whitelisted: true

event_time_constraints:
  min_created_at: 1577836800
  max_created_at_string: now+5m

rate_limit:
  ws_limit: 500
  ws_burst: 1000
  event_limit: 500
  event_burst: 1000
  req_limit: 500
  req_burst: 1000
  max_event_size: 524288
  kind_size_limits: []
  category_limits: {}
  kind_limits: []
