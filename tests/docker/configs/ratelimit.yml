logging:
  level: "warn"
  file: "debug"
  max_log_size_mb: 10
  structure: false
  check_interval_min: 10
  backup_count: 2

client:
  default_relays: []

database:
  path: "data"
  map_size_mb: 32

server:
  port: :8183
  read_timeout: 60
  write_timeout: 20
  idle_timeout: 1200
  max_subscriptions_per_client: 10
  implicit_req_limit: 500

resource_limits:
  cpu_cores: 2
  memory_mb: 512
  heap_size_mb: 256

auth:
  enabled: false
  relay_url: "ws://localhost:8183"

backup_relay:
  enabled: false
  url: ""

event_purge:
  enabled: false
  disable_at_startup: true
  keep_interval_hours: 24
  purge_interval_minutes: 240
  purge_by_category: {regular: false, replaceable: false, addressable: false, deprecated: false}
  purge_by_kind_enabled: false
  kinds_to_purge: []
  exclude_whitelisted: true

event_time_constraints:
  min_created_at: 1577836800
  max_created_at_string: now+5m

# Tight limits for rate limit testing.
# ws_limit stays permissive — the test suite does not exercise it, and the
# ws limiter is a *global* rate.Limiter shared across all test clients on
# this port, so cramping it causes unrelated tests on the same scenario
# container (e.g. size-limit tests) to hit NOTICE+close and read EOF
# instead of the OK-false they expect.
rate_limit:
  ws_limit: 500
  ws_burst: 1000
  event_limit: 3       # 3 events/sec global
  event_burst: 3
  req_limit: 2         # 2 REQs/sec
  req_burst: 2
  max_event_size: 1024 # 1KB global cap

  # Per-kind size cap (kind 1 = 512 bytes).
  # A minimal signed event is ~300 bytes (id + pubkey + sig), so the cap
  # must be above that for rate-limit tests to fire before the size check.
  kind_size_limits:
    - kind: 1
      max_size: 512

  # Category caps (regular covers kind 1)
  category_limits:
    regular:
      limit: 2
      burst: 2
    replaceable:
      limit: 10
      burst: 20

  # Per-kind rate cap (kind 7 limited to 1/sec)
  kind_limits:
    - kind: 7
      limit: 1
      burst: 1
