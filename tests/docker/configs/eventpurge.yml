logging:
  level: "warn"
  file: "debug"
  max_log_size_mb: 10
  structure: false
  check_interval_min: 10
  backup_count: 2

client:
  default_relays: []

database:
  path: "data"
  map_size_mb: 256

server:
  port: :8188
  read_timeout: 60
  write_timeout: 20
  idle_timeout: 1200
  max_subscriptions_per_client: 10
  implicit_req_limit: 500

resource_limits:
  cpu_cores: 2
  memory_mb: 512
  heap_size_mb: 256

auth:
  enabled: false
  relay_url: "ws://localhost:8188"

backup_relay:
  enabled: false
  url: ""

# Aggressive purge for tests. Minimum interval unit is minutes.
event_purge:
  enabled: true
  disable_at_startup: false
  keep_interval_hours: 0         # drop anything older than 0 hours = immediate
  purge_interval_minutes: 1      # purge once per minute
  purge_by_category:
    regular: true
    replaceable: false
    addressable: false
    deprecated: true
  purge_by_kind_enabled: true
  kinds_to_purge:
    - 1
  exclude_whitelisted: true

event_time_constraints:
  min_created_at: 1577836800
  max_created_at_string: now+5m

rate_limit:
  ws_limit: 500
  ws_burst: 1000
  event_limit: 500
  event_burst: 1000
  req_limit: 500
  req_burst: 1000
  max_event_size: 524288
  kind_size_limits: []
  category_limits: {}
  kind_limits: []
